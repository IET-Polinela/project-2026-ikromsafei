name: Deploy Frontend SPA to GitHub Pages

on:
  push:
    branches:
      - main  # Kalau branch utama GitHub-mu namanya 'master', ganti kata main ini jadi master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Folder hasil build (biasanya 'dist' atau 'build')
          branch: gh-pages