<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        /* Mengunci layar penuh untuk gerbang login native sebelum masuk */
        .auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #f4f6f9;
            z-index: 999999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card { width: 100%; max-width: 420px; border: none; border-radius: 16px; }
    </style>
</head>
<body>

    <div id="auth-container" class="auth-overlay">
        <div class="container d-flex justify-content-center">
            
            <div id="login-box" class="card auth-card p-4 shadow-lg bg-white">
                <div class="text-center mb-4">
                    <div class="bg-primary text-white d-inline-block p-3 rounded-circle mb-2 shadow">
                        <i class="fa-solid fa-building-shield fa-2x"></i>
                    </div>
                    <h4 class="fw-bold m-0 text-dark">Smart City Portal</h4>
                    <p class="text-muted small">Silakan login menggunakan akun kelompok kalian</p>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold text-secondary">Username</label>
                    <input type="text" id="username" class="form-control py-2" placeholder="Masukkan username">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold text-secondary">Password</label>
                    <input type="password" id="password" class="form-control py-2" placeholder="Masukkan password">
                </div>
                <button id="login-btn" class="btn btn-primary w-100 py-2 fw-bold rounded-3 mb-3">Masuk Portal</button>
            </div>

        </div>
    </div>

    <div id="app"></div>


    <script>
        // Trigger backup: Begitu tombol diklik, jika auth.js sukses, hilangkan paksa overlaynya
        document.getElementById('login-btn')?.addEventListener('click', function() {
            setTimeout(() => {
                // Jika URL sudah mendeteksi hash dashboard, langsung hancurkan layar login depan
                if (window.location.hash === '#dashboard' || window.location.hash === '#/dashboard') {
                    document.getElementById('auth-container').style.setProperty('display', 'none', 'important');
                }
            }, 500); // Beri jeda setengah detik untuk proses pengecekan akun asli lab kalian
        });

        // Jaga-jaga jika halaman di-reload dan hash sudah di #dashboard
        window.addEventListener('DOMContentLoaded', () => {
            if (window.location.hash === '#dashboard' || window.location.hash === '#/dashboard') {
                document.getElementById('auth-container').style.setProperty('display', 'none', 'important');
            }
        });
    </script>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
