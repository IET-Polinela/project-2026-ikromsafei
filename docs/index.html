<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Portal - Pesawaran</title>
    <!-- Bootstrap 5 CDN Resmi -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icon -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .auth-card {
            max-width: 450px;
            margin: 80px auto;
            border: none;
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <!-- ========================================================= -->
    <!-- 1. PINTU GERBANG AUTH (LOGIN & REGISTER) -->
    <!-- ========================================================= -->
    <div id="auth-container" class="container">
        
        <!-- Form Login -->
        <div id="login-box" class="card auth-card p-4 shadow-sm bg-white">
            <h3 class="text-center fw-bold text-dark mb-4">Login Portal Warga</h3>
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" id="login-username" class="form-control py-2" placeholder="Masukkan username">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" id="login-password" class="form-control py-2" placeholder="Masukkan password">
            </div>
            <button id="btn-login" class="btn btn-primary w-100 py-2 fw-bold mb-3">Masuk</button>
            <p class="text-center small text-muted mb-0">Belum punya akun? <a href="#" id="link-ke-daftar" class="text-decoration-none fw-bold">Daftar di sini</a></p>
        </div>

        <!-- Form Daftar Warga Baru -->
        <div id="register-box" class="card auth-card p-4 shadow-sm bg-white d-none">
            <h3 class="text-center fw-bold text-dark mb-4">Daftar Akun Warga</h3>
            <div class="mb-3">
                <label class="form-label fw-semibold">Nama Lengkap</label>
                <input type="text" id="reg-nama" class="form-control py-2" placeholder="Masukkan nama lengkap">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Username Baru</label>
                <input type="text" id="reg-username" class="form-control py-2" placeholder="Buat username">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" id="reg-password" class="form-control py-2" placeholder="Buat password">
            </div>
            <button id="btn-register" class="btn btn-success w-100 py-2 fw-bold mb-3">Daftar Sekarang</button>
            <p class="text-center small text-muted mb-0">Sudah punya akun? <a href="#" id="link-ke-login" class="text-decoration-none fw-bold">Login di sini</a></p>
        </div>

    </div>


    <!-- ========================================================= -->
    <!-- 2. WADAH UTAMA APLIKASI ASLI HASIL LAB KALIAN -->
    <!-- ========================================================= -->
    <!-- Awalnya kita sembunyikan, begitu login sukses langsung dibuka -->
    <div id="app-content-wrapper" class="d-none">
        
        <!-- NAVBAR UTAMA ASLI (Bawaan Kode Lab Kamu) -->
        <nav class="navbar navbar-dark bg-primary shadow-sm mb-4">
            <div class="container-fluid justify-content-between px-4">
                <span class="navbar-brand mb-0 h1 fw-bold">
                    🏢 Smart City Portal
                </span>
                <button id="btn-logout-portal" class="btn btn-light btn-sm fw-bold text-danger">Logout</button>
            </div>
        </nav>

        <!-- Di sinilah semua elemen template, tabel aduan, filter kategori, -->
        <!-- dan isian data hasil kodingan lab kelompokmu disuntikkan secara otomatis -->
        <div id="app"></div> 
        
    </div>


    <!-- ========================================================= -->
    <!-- 3. LOGIKA INTEGRASI SINKRONISASI -->
    <!-- ========================================================= -->
    <script>
        // Set Akun Default di Browser
        if (!localStorage.getItem('users')) {
            localStorage.setItem('users', JSON.stringify([
                { username: 'admin', password: 'admin123', role: 'admin' },
                { username: 'wawan', password: 'wawan123', role: 'warga' }
            ]));
        }

        // Navigasi Kotak Auth
        document.getElementById('link-ke-daftar')?.addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('login-box').classList.add('d-none');
            document.getElementById('register-box').classList.remove('d-none');
        });
        document.getElementById('link-ke-login')?.addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('register-box').classList.add('d-none');
            document.getElementById('login-box').classList.remove('d-none');
        });

        // Logika Daftar Akun Warga
        document.getElementById('btn-register')?.addEventListener('click', function() {
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value.trim();
            if (!username || !password) { alert('Kolom wajib diisi!'); return; }

            let users = JSON.parse(localStorage.getItem('users')) || [];
            if (users.find(u => u.username === username)) { alert('Username sudah ada!'); return; }

            users.push({ username: username, password: password, role: 'warga' });
            localStorage.setItem('users', JSON.stringify(users));
            alert('Daftar Berhasil! Silakan Login.');
            document.getElementById('register-box').classList.add('d-none');
            document.getElementById('login-box').classList.remove('d-none');
        });

        // Logika Login Sukses -> Langsung Bongkar Munculin Hasil Lab Asli
        document.getElementById('btn-login')?.addEventListener('click', function() {
            const uIn = document.getElementById('login-username').value.trim();
            const pIn = document.getElementById('login-password').value.trim();
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const valid = users.find(u => u.username === uIn && u.password === pIn);

            if (valid) {
                alert('Login Sukses!');
                // Sembunyikan Gerbang Login, Buka Aplikasi Asli Hasil Lab
                document.getElementById('auth-container').classList.add('d-none');
                document.getElementById('app-content-wrapper').classList.remove('d-none');
                
                // Paksa pemicu (trigger) Router SPA bawaan lab kamu biar ngerender isi tabelnya
                window.location.hash = '#dashboard';
                if (typeof initRouter === 'function') { initRouter(); }
                if (typeof handleRouting === 'function') { handleRouting(); }
            } else {
                alert('Username atau Password Salah!');
            }
        });

        // Tombol Keluar Kembali Kunci Layar
        document.getElementById('btn-logout-portal')?.addEventListener('click', function() {
            document.getElementById('app-content-wrapper').classList.add('d-none');
            document.getElementById('auth-container').classList.remove('d-none');
            window.location.hash = '';
        });
    </script>

    <!-- MEMANGGIL FILE UTAMA HASIL LAB JAVASCRIPT KELOMPOKMU -->
    <!-- Kode di dalam file-file inilah yang beneran ngatur tabel rekap keluhan aslimu -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
