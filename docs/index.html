<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Portal</title>
    <!-- CSS Bootstrap 5 & FontAwesome CDN Resmi bawaan template lab -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
    </style>
</head>
<body>

    <!-- ========================================================= -->
    <!-- WADAH UTAMA AKTIF (100% DIKONTROL OLEH JS ASLI KELOMPOK) -->
    <!-- ========================================================= -->
    <!-- Wadah ini wajib kosong agar file router.js dan app.js kelompokmu -->
    <!-- bisa menyuntikkan form Login Warga dan list kartu laporan secara normal -->
    <div id="app"></div>


    <!-- ========================================================= -->
    <!-- JAVASCRIPT DEPENDENCY & LOGIKA PENYELAMAT ROUTER -->
    <!-- ========================================================= -->
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // SOLUSI ANTI-BLANK: Jika browser menyimpan cache #dashboard lama,
        // kita paksa bersihkan dan arahkan ke root URL agar form "Login Warga" mau muncul.
        if (window.location.hash === '#dashboard' || window.location.hash === '#/dashboard') {
            window.location.hash = '';
        }
    </script>
    
    <!-- Eksekusi seluruh file inti Javascript kelompok lab kalian sesuai urutan -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
