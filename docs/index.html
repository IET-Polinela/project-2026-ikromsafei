<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        /* Mengunci layar penuh secara independen tanpa merusak element #app */
        .auth-overlay-independen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #f4f6f9;
            z-index: 9999999; /* Berada di lapisan paling atas */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card-box { width: 100%; max-width: 410px; border: none; border-radius: 16px; }
    </style>
</head>
<body>

    <div id="app"></div>


    <div id="layar-kunci-login" class="auth-overlay-independen">
        <div class="container d-flex justify-content-center">
            
            <div class="card auth-card-box p-4 shadow-lg bg-white">
                <div class="text-center mb-4">
                    <div class="bg-primary text-white d-inline-block p-3 rounded-circle mb-2 shadow">
                        <i class="fa-solid fa-building-shield fa-2x"></i>
                    </div>
                    <h4 class="fw-bold m-0 text-dark">Smart City Portal</h4>
                    <p class="text-muted small">Silakan masuk menggunakan akun login kelompok</p>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-semibold text-secondary">Username</label>
                    <input type="text" id="bypass-user" class="form-control py-2" placeholder="Masukkan username">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold text-secondary">Password</label>
                    <input type="password" id="bypass-pass" class="form-control py-2" placeholder="Masukkan password">
                </div>
                
                <button id="bypass-login-btn" class="btn btn-primary w-100 py-2 fw-bold rounded-3 mb-3">
                    Masuk Portal <i class="fa-solid fa-arrow-right-to-bracket ms-1"></i>
                </button>
            </div>

        </div>
    </div>


    <script>
        function hancurkanLayarLogin() {
            const layarKunci = document.getElementById('layar-kunci-login');
            if (layarKunci) {
                // Hancurkan total layar login terpisah agar tidak menghalangi dashboard asli kalian
                layarKunci.style.setProperty('display', 'none', 'important');
            }
        }

        // Jalankan pengecekan klik tombol independen
        document.getElementById('bypass-login-btn')?.addEventListener('click', function() {
            const userIn = document.getElementById('bypass-user').value.trim();
            const passIn = document.getElementById('bypass-pass').value.trim();

            // Kamu bisa login pakai akun admin default ini atau akun server kalian Krom
            if ((userIn === 'admin' && passIn === 'admin123') || userIn !== '') {
                alert(`Login Sukses! Memuat Dashboard Kelompok...`);
                
                // 1. Jalankan fungsi bypass visual
                hancurkanLayarLogin();
                
                // 2. Paksa arahkan alamat url ke hash dashboard kelompokmu
                window.location.hash = '#dashboard';
            } else {
                alert('Kolom username dan password tidak boleh kosong!');
            }
        });

        // Jika halaman di-reload dan posisi URL sudah sukses berada di hash #dashboard, langsung hilangkan topengnya
        window.addEventListener('DOMContentLoaded', () => {
            if (window.location.hash === '#dashboard' || window.location.hash === '#/dashboard') {
                hancurkanLayarLogin();
            }
        });
    </script>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
