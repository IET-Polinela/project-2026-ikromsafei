<div id="auth-container" class="container py-5">
    
    <div id="login-box" class="card p-4 shadow-sm mx-auto" style="max-width: 450px;">
        <h3 class="text-center fw-bold mb-4">Login Portal Warga</h3>
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" id="login-username" class="form-line form-control" placeholder="Masukkan username">
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="login-password" class="form-line form-control" placeholder="Masukkan password">
        </div>
        <button id="btn-login" class="btn btn-primary w-100 mb-3">Masuk</button>
        <p class="text-center small text-muted mb-0">Belum punya akun? <a href="#" id="link-ke-daftar" class="text-decoration-none fw-bold">Daftar di sini</a></p>
    </div>

    <div id="register-box" class="card p-4 shadow-sm mx-auto d-none" style="max-width: 450px;">
        <h3 class="text-center fw-bold mb-4">Daftar Akun Warga</h3>
        <div class="mb-3">
            <label class="form-label">Nama Lengkap</label>
            <input type="text" id="reg-nama" class="form-control" placeholder="Masukkan nama lengkap">
        </div>
        <div class="mb-3">
            <label class="form-label">Username Baru</label>
            <input type="text" id="reg-username" class="form-control" placeholder="Buat username">
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="reg-password" class="form-control" placeholder="Buat password">
        </div>
        <button id="btn-register" class="btn btn-success w-100 mb-3">Daftar Sekarang</button>
        <p class="text-center small text-muted mb-0">Sudah punya akun? <a href="#" id="link-ke-login" class="text-decoration-none fw-bold">Login di sini</a></p>
    </div>

</div>
