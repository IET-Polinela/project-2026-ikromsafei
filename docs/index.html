<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Portal</title>
    <!-- CSS Bootstrap 5 & FontAwesome CDN Resmi -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; min-height: 100vh; display: flex; flex-direction: column; margin: 0; }
        .card-custom { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        /* Layout Auth Sesuai Gambar Full Screen */
        .auth-overlay-independen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #f4f6f9;
            z-index: 9999999;
            display: flex;
            flex-direction: column;
        }
        .auth-container-center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card-box { width: 100%; max-width: 480px; border: none; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); padding: 35px !important; }
        .w-100-nav { width: 100% !important; margin: 0 !important; border-radius: 0 !important; }
    </style>
</head>
<body>

    <!-- ========================================================= -->
    <!-- 1. MANAGEMENT SCREEN AUTH (LOGIN & REGISTER) -->
    <!-- ========================================================= -->
    <div id="layar-kunci-login" class="auth-overlay-independen">
        <nav class="navbar navbar-dark bg-primary shadow-sm py-3 w-100-nav">
            <div class="container-fluid px-4">
                <span class="navbar-brand mb-0 h1 fw-bold"><i class="fa-solid fa-building-columns me-2"></i>Smart City Portal</span>
            </div>
        </nav>
        
        <div class="auth-container-center">
            <!-- BOX LOGIN ASLI -->
            <div id="box-login-warga" class="card auth-card-box bg-white">
                <div class="text-center mb-4"><h2 class="fw-bold text-dark" style="letter-spacing: -0.5px;">Login Warga</h2></div>
                <div class="mb-3">
                    <label class="form-label text-secondary fw-semibold small">Username</label>
                    <input type="text" id="bypass-user" class="form-control py-2 bg-light" placeholder="Username">
                </div>
                <div class="mb-4">
                    <label class="form-label text-secondary fw-semibold small">Password</label>
                    <input type="password" id="bypass-pass" class="form-control py-2 bg-light" placeholder="Password">
                </div>
                <button id="bypass-login-btn" class="btn btn-primary w-100 py-2 fw-semibold rounded-2 mb-3">Masuk</button>
                <div class="text-center small text-muted">
                    Belum punya akun? <a href="#" id="link-daftar" class="text-decoration-none">Daftar di sini</a>
                </div>
            </div>

            <!-- BOX REGISTER -->
            <div id="box-daftar-warga" class="card auth-card-box bg-white d-none">
                <div class="text-center mb-4"><h2 class="fw-bold text-dark" style="letter-spacing: -0.5px;">Daftar Akun</h2></div>
                <div class="mb-3">
                    <label class="form-label text-secondary fw-semibold small">Nama Lengkap</label>
                    <input type="text" class="form-control py-2 bg-light" placeholder="Nama Lengkap">
                </div>
                <div class="mb-3">
                    <label class="form-label text-secondary fw-semibold small">Username Baru</label>
                    <input type="text" class="form-control py-2 bg-light" placeholder="Username">
                </div>
                <div class="mb-4">
                    <label class="form-label text-secondary fw-semibold small">Password</label>
                    <input type="password" class="form-control py-2 bg-light" placeholder="Buat Password">
                </div>
                <button id="bypass-register-btn" class="btn btn-success w-100 py-2 fw-semibold rounded-2 mb-3">Registrasi Akun</button>
                <div class="text-center small text-muted">
                    Sudah punya akun? <a href="#" id="link-login" class="text-decoration-none">Login di sini</a>
                </div>
            </div>
        </div>
    </div>


    <!-- ========================================================= -->
    <!-- 2. APPS DASHBOARD SCREEN SPA -->
    <!-- ========================================================= -->
    <div id="app" style="display: none;">
        <nav class="navbar navbar-dark bg-primary shadow-sm mb-4 py-3 w-100-nav">
            <div class="container-fluid px-4">
                <span class="navbar-brand mb-0 h1 fw-bold"><i class="fa-solid fa-building-columns me-2"></i>Smart City Portal</span>
            </div>
        </nav>

        <div class="container-fluid px-4">
            <div class="row g-4">
                <!-- SIDEBAR STATUS REKAP -->
                <div class="col-12 col-md-3">
                    <div class="card card-custom p-3 bg-white mb-3">
                        <h5 class="fw-bold mb-3 text-dark">Rekap Laporan</h5>
                        <ul class="list-group list-group-flush small">
                            <li class="list-group-item d-flex justify-content-between align-items-center px-0">Draft <span class="badge bg-secondary rounded-pill" id="badge-draft">0</span></li>
                            <li class="list-group-item d-flex justify-content-between align-items-center px-0">Diproses <span class="badge bg-warning text-dark rounded-pill fw-bold" id="badge-proses">0</span></li>
                            <li class="list-group-item d-flex justify-content-between align-items-center px-0">Selesai <span class="badge bg-success rounded-pill" id="badge-selesai">0</span></li>
                        </ul>
                        <button class="btn btn-danger w-100 fw-bold mt-3 btn-sm" id="btn-keluar-portal"><i class="fa-solid fa-right-from-bracket me-1"></i> Keluar</button>
                    </div>
                </div>

                <!-- MAIN AREA -->
                <div class="col-12 col-md-9">
                    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                        <div class="btn-group btn-group-sm">
                            <button id="btn-laporan-saya" class="btn btn-primary fw-bold px-3">Laporan Saya</button>
                            <button id="btn-feed-kota" class="btn btn-outline-primary fw-bold px-3">Feed Kota</button>
                        </div>
                        <button id="btn-tambah-laporan" class="btn btn-primary btn-sm fw-bold rounded-2 px-3" data-bs-toggle="modal" data-bs-target="#modalTambahLaporan">
                            <i class="fa-solid fa-plus me-1"></i> Tambah Laporan
                        </button>
                    </div>

                    <!-- GRID CONTAINER CARD ADUAN -->
                    <div class="row g-3" id="container-cards"></div>
                </div>
            </div>
        </div>
    </div>


    <!-- ========================================================= -->
    <!-- 3. MODAL DIALOG MANAGEMENT -->
    <!-- ========================================================= -->
    <!-- Modal Tambah Laporan (User dengan Pilihan Status) -->
    <div class="modal fade" id="modalTambahLaporan" tabindex="-1" aria-hidden="true" style="z-index: 10000000;">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title fw-bold">Buat Pengaduan Warga Baru</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">Judul Keluhan</label><input type="text" id="add-judul" class="form-control" placeholder="Contoh: Saluran Air Tersumbat"></div>
                    <div class="mb-3"><label class="form-label">Deskripsi Lengkap Masalah</label><textarea id="add-deskripsi" class="form-control" rows="3" placeholder="Tulis rincian keluhan..."></textarea></div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Status Awal Laporan</label>
                        <select id="add-status" class="form-select">
                            <option value="Draft">Simpan sebagai Draft (Hanya Dilihat Saya & Sembunyi dari Admin)</option>
                            <option value="Reported">Kirim Langsung (Diproses Admin & Masuk Feed)</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button><button type="button" class="btn btn-primary" id="btn-simpan-aduan">Proses Laporan</button></div>
            </div>
        </div>
    </div>

    <!-- Modal Edit Status Laporan (Khusus Admin - Pilihan Hanya Reported & Selesai) -->
    <div class="modal fade" id="modalEditAdmin" tabindex="-1" aria-hidden="true" style="z-index: 10000000;">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-warning text-dark"><h5 class="modal-title fw-bold"><i class="fa-solid fa-pen-to-square me-2"></i>Review & Edit Rekap (Role: Admin)</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <input type="hidden" id="edit-index">
                    <div class="mb-3"><label class="form-label fw-semibold">Judul Keluhan</label><input type="text" id="edit-judul" class="form-control" readonly></div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-danger">Ubah Status Rekap Laporan</label>
                        <select id="edit-status" class="form-select fw-bold">
                            <option value="Reported">Diproses (Reported)</option>
                            <option value="Selesai">Selesai</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button><button type="button" class="btn btn-warning fw-bold text-dark" id="btn-update-admin">Update Status Rekap</button></div>
            </div>
        </div>
    </div>


    <!-- ========================================================= -->
    <!-- 4. LOGIKA LOCAL STORAGE & AUTOMATION SYSTEM SPA -->
    <!-- ========================================================= -->
    <script>
        // Data Awal Kelompok & Feed Kota Melimpah
        const dataAwalBawaan = [
            { id: 1, judul: "jalan rusak", deskripsi: "menyebabkan kecelakaan di dekat tikungan", pengirim: "wahyu_tri", status: "Reported" },
            { id: 2, judul: "jalan", deskripsi: "surak dan berlubang parah", pengirim: "nopal_kembar", status: "Reported" },
            { id: 3, judul: "aa", deskripsi: "bbb", pengirim: "fadilah_citizen", status: "Reported" },
            { id: 4, judul: "Sampah Menumpuk", deskripsi: "Sampah di pasar pagi belum diangkut 3 hari, bau menyengat.", pengirim: "budi_warga", status: "Reported" },
            { id: 5, judul: "Lampu Penyeberangan Mati", deskripsi: "Sangat berbahaya bagi penyeberang jalan di depan kampus polinela.", pengirim: "anisa_cantik", status: "Selesai" },
            { id: 6, judul: "Pohon Tumbang Hambat Jalan", deskripsi: "Pohon tumbang menghalangi sebagian lajur lalu lintas kota.", pengirim: "nadia_lestari", status: "Reported" },
            { id: 7, judul: "Fasilitas Taman Rusak", deskripsi: "Kursi dan wahana bermain anak di taman kota banyak yang patah.", pengirim: "arfal_ganteng", status: "Reported" }
        ];

        if (!localStorage.getItem('db_smartcity_portal')) {
            localStorage.setItem('db_smartcity_portal', JSON.stringify(dataAwalBawaan));
        }

        let currentUser = "";
        let currentTab = "saya"; 

        // Manajemen Pindah Form Auth
        document.getElementById('link-daftar').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('box-login-warga').classList.add('d-none');
            document.getElementById('box-daftar-warga').classList.remove('d-none');
        });

        document.getElementById('link-login').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('box-daftar-warga').classList.add('d-none');
            document.getElementById('box-login-warga').classList.remove('d-none');
        });

        document.getElementById('bypass-register-btn').addEventListener('click', function() {
            alert('Registrasi berhasil! Akun tersimpan.');
            document.getElementById('box-daftar-warga').classList.add('d-none');
            document.getElementById('box-login-warga').classList.remove('d-none');
        });

        // Trigger Login
        document.getElementById('bypass-login-btn').addEventListener('click', function() {
            const user = document.getElementById('bypass-user').value.trim();
            const pass = document.getElementById('bypass-pass').value.trim();

            if (!user || !pass) {
                alert('Username dan Password wajib diisi!');
                return;
            }

            currentUser = user.toLowerCase();
            alert(`Login Sukses! Masuk sebagai: ${user}`);

            document.getElementById('layar-kunci-login').style.setProperty('display', 'none', 'important');
            document.getElementById('app').style.display = 'block';
            window.location.hash = '#dasbor';

            renderAduanWarga();
        });

        // Core Render System
        function renderAduanWarga() {
            const container = document.getElementById('container-cards');
            container.innerHTML = "";

            let database = JSON.getObjLocal('db_smartcity_portal');

            // Hitung Badge Rekap Real-Time
            let dftCount = database.filter(i => (currentUser === 'admin' ? false : i.pengirim === currentUser) && i.status === 'Draft').length;
            let prsCount = database.filter(i => i.status === 'Reported').length;
            let slsCount = database.filter(i => i.status === 'Selesai').length;

            document.getElementById('badge-draft').innerText = currentUser === 'admin' ? '0 (Hidden)' : dftCount;
            document.getElementById('badge-proses').innerText = prsCount;
            document.getElementById('badge-selesai').innerText = slsCount;

            // Hak Akses Tombol Tambah Laporan
            const btnTambah = document.getElementById('btn-tambah-laporan');
            btnTambah.style.setProperty('display', currentUser === 'admin' ? 'none' : 'inline-block', 'important');

            // Filter Tampilan Berdasarkan Tab Menu & Role
            let dataTampil = [];
            if (currentTab === "feed") {
                // Feed kota hanya menampilkan laporan resmi (Reported & Selesai)
                dataTampil = database.filter(item => item.status !== 'Draft');
            } else {
                // Tab Laporan Saya
                if (currentUser === 'admin') {
                    // ATURAN MUTLAK ADMIN: Hanya load data yang BUKAN draft. Admin tidak tahu kalau ada draft!
                    dataTampil = database.filter(item => item.status !== 'Draft');
                } else {
                    // User biasa bisa melihat kiriman Reported, Selesai, maupun Draft miliknya sendiri
                    dataTampil = database.filter(item => item.pengirim === currentUser);
                }
            }

            if (dataTampil.length === 0) {
                container.innerHTML = `<div class="col-12 text-center py-5 text-muted"><i class="fa-solid fa-folder-open fa-2x mb-2"></i><br>Belum ada laporan yang tersedia.</div>`;
                return;
            }

            dataTampil.forEach((item) => {
                // Aturan Nama Pengirim: Admin melihat sebagai 'Anonim'
                let displayNama = (currentUser === 'admin') ? 'Anonim' : item.pengirim;
                
                // Tombol Edit Admin (Hanya untuk Reported / Selesai)
                let tombolEditAdmin = "";
                if (currentUser === 'admin') {
                    tombolEditAdmin = `<button class="btn btn-sm btn-warning fw-bold text-dark px-3 ms-2" onclick="bukaModalEditAdmin(${item.id})"><i class="fa-solid fa-pen-to-square me-1"></i>Edit Status</button>`;
                }

                let badgeColor = "bg-info";
                if (item.status === 'Draft') badgeColor = "bg-secondary";
                if (item.status === 'Selesai') badgeColor = "bg-success";

                container.innerHTML += `
                    <div class="col-12 col-sm-6">
                        <div class="card card-custom p-3 bg-white">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="fw-bold text-dark m-0">${item.judul}</h5>
                                <span class="badge ${badgeColor} text-white small">${item.status}</span>
                            </div>
                            <p class="text-muted small mb-3">${item.deskripsi}</p>
                            <div class="progress mb-3" style="height: 6px;"><div class="progress-bar ${item.status === 'Selesai' ? 'bg-success' : 'bg-info'} progress-bar-striped progress-bar-animated" style="width: ${item.status === 'Selesai' ? '100%' : '45%'}"></div></div>
                            <div class="d-flex justify-content-between align-items-center border-top pt-2 mt-2 text-muted small">
                                <span><i class="fa-solid fa-user me-1"></i> Pengirim: <b>${displayNama}</b></span>
                                <div>${tombolEditAdmin}</div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // Simpan Aduan Baru (Persistent)
        document.getElementById('btn-simpan-aduan').addEventListener('click', function() {
            const jdl = document.getElementById('add-judul').value.trim();
            const dsk = document.getElementById('add-deskripsi').value.trim();
            const sts = document.getElementById('add-status').value;

            if (!jdl || !dsk) {
                alert('Judul dan Deskripsi aduan wajib diisi!');
                return;
            }

            let database = JSON.getObjLocal('db_smartcity_portal');
            let idBaru = database.length > 0 ? Math.max(...database.map(o => o.id)) + 1 : 1;

            database.unshift({ id: idBaru, judul: jdl, deskripsi: dsk, pengirim: currentUser, status: sts });
            localStorage.setObjLocal('db_smartcity_portal', database);

            document.getElementById('add-judul').value = "";
            document.getElementById('add-deskripsi').value = "";
            
            bootstrap.Modal.getInstance(document.getElementById('modalTambahLaporan')).hide();

            alert(sts === 'Draft' ? 'Draft berhasil disimpan secara privat!' : 'Sukses! Laporan berhasil dikirim ke database kota.');
            renderAduanWarga();
        });

        // Editor Admin
        function bukaModalEditAdmin(targetId) {
            let database = JSON.getObjLocal('db_smartcity_portal');
            let item = database.find(o => o.id === targetId);

            document.getElementById('edit-index').value = targetId;
            document.getElementById('edit-judul').value = item.judul;
            document.getElementById('edit-status').value = item.status;
            
            new bootstrap.Modal(document.getElementById('modalEditAdmin')).show();
        }

        // Update Perubahan Status dari Admin
        document.getElementById('btn-update-admin').addEventListener('click', function() {
            let targetId = parseInt(document.getElementById('edit-index').value);
            let statusBaru = document.getElementById('edit-status').value;

            let database = JSON.getObjLocal('db_smartcity_portal');
            let itemIndex = database.findIndex(o => o.id === targetId);
            
            database[itemIndex].status = statusBaru;
            localStorage.setObjLocal('db_smartcity_portal', database);

            bootstrap.Modal.getInstance(document.getElementById('modalEditAdmin')).hide();

            alert('Berhasil! Status rekap laporan warga telah diperbarui oleh Admin.');
            renderAduanWarga();
        });

        JSON.getObjLocal = function(key) { return JSON.parse(localStorage.getItem(key)); }
        localStorage.setObjLocal = function(key, obj) { localStorage.setItem(key, JSON.stringify(obj)); }

        // Navigasi Tab Menu
        document.getElementById('btn-feed-kota').addEventListener('click', function() {
            currentTab = "feed";
            this.classList.replace('btn-outline-primary', 'btn-primary');
            document.getElementById('btn-laporan-saya').classList.replace('btn-primary', 'btn-outline-primary');
            renderAduanWarga();
        });

        document.getElementById('btn-laporan-saya').addEventListener('click', function() {
            currentTab = "saya";
            this.classList.replace('btn-outline-primary', 'btn-primary');
            document.getElementById('btn-feed-kota').classList.replace('btn-primary', 'btn-outline-primary');
            renderAduanWarga();
        });

        // Tombol Keluar Portal
        document.getElementById('btn-keluar-portal').addEventListener('click', function() {
            window.location.hash = '';
            location.reload();
        });
    </script>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Script core lab penunjang (wajib dipanggil agar tidak memicu error 404) -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
