<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga Smart City Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .spa-container { min-height: calc(100vh - 80px); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-buildings-fill me-2"></i>Smart City Portal</a>
            <div id="nav-menus" class="ms-auto"></div>
        </div>
    </nav>

    <main class="container-fluid px-4 mt-4 spa-container" id="app-content"></main>

    <div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold" id="reportModalLabel"><i class="bi bi-pencil-square me-2"></i>Form Laporan</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="reportForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Judul Masalah</label>
                            <input type="text" id="formTitle" class="form-control" placeholder="Contoh: Lampu Jalan Padam" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Kategori Masalah</label>
                            <select id="formCategory" class="form-select" required>
                                <option value="Jalan Rusak">Jalan Rusak</option>
                                <option value="Sampah">Sampah</option>
                                <option value="Lampu Mati">Lampu Mati</option>
                                <option value="Drainase">Drainase</option>
                                <option value="Keamanan">Keamanan</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Lokasi Detail Kejadian</label>
                            <input type="text" id="formLocation" class="form-control" placeholder="Nama jalan, RT/RW, kecamatan" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Deskripsi Kronologi Lengkap</label>
                            <textarea id="formDescription" class="form-control" rows="3" placeholder="Ceritakan detail keluhan Anda..." required></textarea>
                        </div>
                        
                        <div class="d-flex justify-content-between mt-4">
                            <button type="button" class="btn btn-outline-secondary fw-bold px-4" id="btnDraft" onclick="submitForm('DRAFT')">Simpan Draft</button>
                            <button type="button" class="btn btn-primary fw-bold px-4" id="btnSubmit" onclick="submitForm('REPORTED')">
                                <i class="bi bi-send-fill me-1"></i>Ajukan
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
